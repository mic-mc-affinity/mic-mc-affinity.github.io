<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campaign Library</title>

<style>
:root{
    --blue:#2e3b51;
    --bg:#f4f4f4;
    --card:#ffffff;
    --text:#222;
    --border:#e5e5e5;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background-color:#e5e5e5;
    color:#2e3b51;
    font-family:Arial, Helvetica, sans-serif;
    margin:0;
}

/* HEADER */

.header{
    background:white;
    padding:10px 20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.header-inner{

    max-width:600px;
    margin:0 auto;
    display:flex;
    justify-content:flex-start;
    align-items:flex-end;
    gap:20px;

}

.header-logo{
    width:50px;
    height:auto;
}

.header-title{
    flex:1;
    text-align:center;
    font-size:1.3rem;
    font-weight:600;
    line-height:1;
}

/* PAGE CONTENT */

.content{
    padding:50px 20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.back-button{
    display:inline-block;
    background:#2e3b51;
    color:white;
    text-decoration:none;
    padding:18px;
    border-radius:10px;
    font-weight:600;
    transition:all .2s ease;
    margin-bottom:25px;
}

.back-button:hover{
    transform:translateY(-2px);
    opacity:.9;
}

h1{
    margin-bottom:40px;
    color:var(--blue);
    text-align:center;
}

.card{
    max-width:750px;
    margin:auto;
    background:var(--card);
    padding:20px;
    border-radius:12px;
    border:1px solid var(--border);
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
    color:var(--blue);
    margin-bottom:15px;
    font-size:1.8rem;
}

.video-wrapper{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    overflow:hidden;
    border-radius:10px;
    margin-bottom:20px;
}

.video-wrapper iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.description{
    margin-bottom:15px;
    line-height:1.5;
}

.links{
    list-style:none;
}

.links li{
    margin-bottom:8px;
}

.links a{
    color:var(--blue);
    text-decoration:none;
    font-weight:600;
}

.links a:hover{
    text-decoration:underline;
}

/* MOBILE */

@media (max-width:768px){

    .header-inner{
        flex-direction:column;
        align-items:center;
        gap:10px;
    }

    .header-logo{
        width:100px;
    }

    .header-title{
        font-size:1.2rem;
    }

    .content{
        padding:30px 20px;
    }

    .back-button{
        padding:14px;
    }

}
</style>
</head>

<body>

<header class="header">

    <div class="header-inner">

        <img src="../images/NXT-Primary Stacked.png"
            alt="NXT Logo"
            class="header-logo">

        <div class="header-title">
            CAMPAIGN EXAMPLES
        </div>

    </div>

</header>

<div class="content">

    <a href="https://mic-mc-affinity.github.io/barilla-proteinplus/" class="back-button">
        ← All Examples
    </a>

<div class="container">

    <h1>Barilla Protein Plus Pasta</h1>

    <div class="card">

        <h2>C&U and B&I Example</h2>

        <div class="video-wrapper">

            <iframe
                src="https://player.vimeo.com/video/1184931776?h=10c8339a5a"
                title="C&U B&I Campaign"
                allowfullscreen>

            </iframe>

        </div>

        <div style="display:none;">

            <p class="description">

                Supporting materials:

            </p>

            <ul class="links">

                <li><a href="#">resource link</a></li>

                <li><a href="#">resource link</a></li>

            </ul>

        </div>

    </div>

</div>

</div>

</body>

</html>
