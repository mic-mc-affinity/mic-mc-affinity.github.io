<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campaign Library</title>

<style>

:root{
    --blue:#2e3b51;
    --bg:#f4f4f4;
    --card:#ffffff;
    --text:#222;
    --border:#e5e5e5;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background-color:#e5e5e5;
    color:#2e3b51;
    font-family:Arial, Helvetica, sans-serif;
    margin:0;
}

/* HEADER */

.header{
    background:white;
    padding:10px 20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.header-inner{

    max-width:600px;
    margin:0 auto;
    display:flex;
    justify-content:flex-start;
    align-items:flex-end;
    gap:20px;

}

.header-logo{
    width:50px;
    height:auto;
}

.header-title{
    flex:1;
    text-align:center;
    font-size:1.3rem;
    font-weight:600;
    line-height:1;
}

/* PAGE CONTENT */

.content{

    padding:50px 20px;

}

.container{

    max-width:1400px;

    margin:auto;

}

.title-logos{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:20px;

    margin-bottom:20px;

}

.title-logos img{

    width:150px;

    height:auto;

}

.title-logos .frh-logo{

    width:90px;

}

h1{

    font-size:1.8rem;

    margin-bottom:20px;

    color:var(--blue);

    text-align:center;

}

h3{

    font-size:1rem;

    margin-bottom:30px;

    color:var(--blue);

    text-align:center;

    font-weight:500;

}

.card{

    max-width:750px;

    margin:auto;

    background:var(--card);

    padding:20px;

    border-radius:12px;

    border:1px solid var(--border);

    box-shadow:0 4px 12px rgba(0,0,0,.08);

    text-align:left;

}

.card h2{

    font-size:1.15rem;

    color:var(--blue);

    margin-bottom:15px;

}

.video-wrapper{

    position:relative;

    width:100%;

    padding-bottom:56.25%;

    overflow:hidden;

    border-radius:10px;

    margin-bottom:20px;

}

.video-wrapper iframe{

    position:absolute;

    top:0;

    left:0;

    width:100%;

    height:100%;

}

.description{

    margin-bottom:8px;

    line-height:1.5;

    font-size:1rem;

    font-weight:400;

}

.links{

    list-style:none;

}

.links li{

    margin-bottom:8px;

}

.links a{

    color:var(--blue);

    text-decoration:underline;

    font-weight:400;

    font-size:1rem;

}

/* MOBILE */

@media (max-width:768px){

    .header-inner{

        flex-direction:column;

        align-items:center;

        gap:10px;

    }

    .header-logo{

        width:100px;

    }

    .header-title{

        font-size:1.2rem;

    }

    .content{

        padding:30px 20px;

    }

}

</style>

</head>

<body>

<header class="header">

    <div class="header-inner">

        <img src="../images/NXT-Primary Stacked.png"
            alt="NXT Logo"
            class="header-logo">

        <div class="header-title">

            CAMPAIGN EXAMPLES

        </div>

    </div>

</header>

<div class="content">

<div class="container">

    <div class="title-logos">

        <img
            src="m4c.png"
            alt="McCormick Logo">

        <img
            class="frh-logo"
            src="frh-logo.png"
            alt="Franks RedHot Logo">

    </div>

    <h1>McCormick <br> Franks RedHot "The GOAT"</h1>

    <h3>Featuring Franks RedHot Original and Full Line</h3>

    <div class="card">

        <h2>Commercial Operator Example</h2>

        <div class="video-wrapper">

            <iframe
                src="https://player.vimeo.com/video/1187927718?h=53506a0b55"
                title="Franks Campaign"
                allowfullscreen>

            </iframe>

        </div>

        <div>

            <p class="description">

                Supporting materials:

            </p>

            <ul class="links">

                <li>

                    <a href="https://www.mccormickforchefs.com/-/media/mccormickforchefs2017/rebates/2026-rebates/m4c_fy26_innovation_rebate_march_digital_120425.pdf?rev=ef8f7be68c7b431b812f77f53abb3350">

                        Rebate

                    </a>

                </li>

            </ul>

        </div>

    </div>

</div>

</div>

</body>

</html>
