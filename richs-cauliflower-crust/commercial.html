<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rich's Cauliflower Crust</title>

<style>

:root{
    --blue:#2e3b51;
    --bg:#f4f4f4;
    --card:#ffffff;
    --text:#222;
    --border:#e5e5e5;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    position:relative;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:50px;
}

.back-button{
    position:absolute;
    top:30px;
    right:30px;

    color:var(--blue);
    background:transparent;

    border:2px solid var(--blue);

    padding:10px 16px;

    border-radius:30px;

    text-decoration:none;

    font-weight:600;

    transition:all .2s ease;
}

.back-button:hover{
    background:var(--blue);
    color:white;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    margin-bottom:40px;
    color:var(--blue);
    text-align:center;
}

.card{
    max-width:750px;
    margin:auto;

    background:var(--card);

    padding:20px;

    border-radius:12px;

    border:1px solid var(--border);

    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
    color:var(--blue);

    margin-bottom:15px;

    font-size:1.8rem;
}

.video-wrapper{
    position:relative;

    width:100%;

    aspect-ratio:16/9;

    overflow:hidden;

    border-radius:10px;

    margin-bottom:20px;
}

.video-wrapper iframe{
    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    border:none;
}

.description{
    margin-bottom:15px;

    line-height:1.5;
}

.links{
    list-style:none;
}

.links li{
    margin-bottom:8px;
}

.links a{
    color:var(--blue);

    text-decoration:none;

    font-weight:600;
}

.links a:hover{
    text-decoration:underline;
}

@media (max-width:768px){

    body{
        padding:20px;
    }

    .back-button{
        top:20px;
        right:20px;

        padding:8px 14px;

        font-size:.9rem;
    }

    h1{
        margin-top:50px;
        margin-bottom:25px;
        font-size:2rem;
    }

}

</style>

</head>

<body>

<a href="https://mic-mc-affinity.github.io/richs-cauliflower-crust/" class="back-button">
    ← All Campaigns
</a>

<div class="container">

    <h1>Rich's Cauliflower Crust</h1>

    <div class="card">

        <h2>Commercial Operators</h2>

        <div class="video-wrapper">

            <iframe
                src="https://player.vimeo.com/video/1192384261?h=3270359ab4"
                title="Commercial Operators"
                allow="autoplay; fullscreen; picture-in-picture"
                allowfullscreen>

            </iframe>

        </div>

        <p class="description">

            Supporting materials:

        </p>

        <ul class="links">

            <li><a href="#">Resource Link</a></li>

            <li><a href="#">Resource Link</a></li>

        </ul>

    </div>

</div>

</body>

</html>
