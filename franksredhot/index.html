<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campaign Library</title>

<style>
:root{
    --blue:#2e3b51;
    --bg:#f4f4f4;
    --card:#ffffff;
    --text:#222;
    --border:#e5e5e5;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:50px;
}

.title-logos{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:20px;

    margin-bottom:20px;

}

.title-logos img{

    width:150px;

    height:auto;

}
.back-button{
    position:absolute;
    top:30px;
    left:30px;

    background:#2e3b51;
    color:white;

    text-decoration:none;

    padding:18px;

    border-radius:10px;

    font-weight:600;

    transition:all .2s ease;
}

.back-button:hover{
    transform:translateY(-2px);
    opacity:.9;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    margin-bottom:20px;
    color:var(--blue);
    text-align:center;
}


h3{
    margin-bottom:30px;
    color:var(--blue);
    text-align:center;
}

.card{
    max-width:750px;
    margin:auto;

    background:var(--card);
    padding:20px;
    border-radius:12px;
    border:1px solid var(--border);
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
    color:var(--blue);
    margin-bottom:15px;
    font-size:1.8rem;
}

.video-wrapper{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    overflow:hidden;
    border-radius:10px;
    margin-bottom:20px;
}

.video-wrapper iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.description{
    margin-bottom:15px;
    line-height:1.5;
}

.links{
    list-style:none;
}

.links li{
    margin-bottom:8px;
}

.links a{
    color:var(--blue);
    text-decoration:none;
    font-weight:600;
}

.links a:hover{
    text-decoration:underline;
}

@media (max-width:768px){

    body{
        padding:20px;
    }

    .back-button{
        position:static;

        display:inline-block;

        margin-bottom:25px;

        padding:14px;
    }

}
</style>
</head>

<body>

<a style="display: none;" href="https://mic-mc-affinity.github.io/" class="back-button">
← All Examples
</a>

<div class="container">

<div class="title-logos">
    <img
        src="m4c.png"
        alt="McCormick Logo">

    <img style="size-adjust: 60%;"
        src="frh-logo.png"
        alt="Franks RedHot Logo">
</div>   

    <h1>McCormick <br> Franks RedHot "The GOAT"</h1>
    <h3>Featuring Franks RedHot Original and Full Line</p>

    <div class="card">

            <h2>Commercial Operator Example</h2>

            <div class="video-wrapper">
                <iframe
                    src="https://player.vimeo.com/video/1187927718?h=53506a0b55"
                    title="Franks Campaign"
                    allowfullscreen>
                </iframe>
            </div>

            <div ;>
        <p class="description">
            Supporting materials:
        </p>

        <ul class="links">
            <li><a href="https://www.mccormickforchefs.com/-/media/mccormickforchefs2017/rebates/2026-rebates/m4c_fy26_innovation_rebate_march_digital_120425.pdf?rev=ef8f7be68c7b431b812f77f53abb3350"
                >Rebate</a></li>
            
        </ul>
            </div>

    </div>

</div>

</body>
</html>
