<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My New Page</title>

  <style>

    body {
      background-color: #2e3b51;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 60px 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      max-width: 700px;
      margin: 0 auto 40px auto;
      line-height: 1.6;
    }

    .button-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 400px;
      margin: auto;
    }

    .button-list a {
      background: white;
      color: #2e3b51;
      text-decoration: none;
      padding: 16px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .button-list a:hover {
      opacity: 0.85;
    }

  </style>

</head>

<body>

  <h1>Page Title</h1>

  <p>
    Add a short description here explaining what this page is about.
  </p>

  <div class="button-list">

    <a href="page1.html">Page 1</a>

    <a href="page2.html">Page 2</a>

    <a href="page3.html">Page 3</a>

    <a href="https://example.com">External Link</a>

  </div>

</body>

</html>
